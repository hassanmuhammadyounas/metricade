name: heartbeat-missing
description: Fly.io worker heartbeat has not been updated in 60 seconds
severity: critical

condition:
  metric: fly_worker_heartbeat_age_seconds
  operator: ">"
  threshold: 60
  for: 1m

annotations:
  summary: "Fly.io inference worker is down — heartbeat missing"
  runbook: docs/runbooks/FLY_WORKER_DOWN.md
  action: |
    1. Immediate: fly machine restart --app behavioral-inference
    2. DLQ will accumulate — safe, drain after recovery
    3. Follow: docs/runbooks/FLY_WORKER_DOWN.md
