name: inference-lag
description: Redis Stream has more than 1000 pending messages
severity: warning

condition:
  metric: behavioral_stream_pending_count
  operator: ">"
  threshold: 1000
  for: 5m

annotations:
  summary: "Inference worker is falling behind — stream backlog building"
  action: |
    1. Check consumer group lag: ./scripts/stream-monitor.sh
    2. Check inference latency: curl https://behavioral-inference.fly.dev/health
    3. If inference_ms > 500: consider scaling up VM size in fly.toml
    4. If worker crashed: follow docs/runbooks/FLY_WORKER_DOWN.md
