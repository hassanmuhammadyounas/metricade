app      = "behavioral-inference"
primary_region = "iad"                  # Must match Upstash region

[build]
dockerfile = "Dockerfile"

[env]
ENVIRONMENT          = "production"
STREAM_NAME          = "behavioral_stream"
CONSUMER_GROUP       = "inference_group"
CONSUMER_NAME        = "fly_worker_1"
DLQ_KEY              = "behavioral_dlq"
HEARTBEAT_KEY        = "fly_worker_heartbeat"
HEARTBEAT_INTERVAL_S = "30"
VECTOR_DIMS          = "192"
MODEL_PATH           = "/models/v1_simclr_trained.pt"
SPOT_CHECK_RATE      = "0.01"           # 1-in-100 upsert verification

[http_service]
internal_port = 8080                    # Health endpoint only — not public
force_https   = true

[[vm]]
size   = "shared-cpu-1x"
memory = "512mb"                        # 256mb is enough for CPU inference at low volume

[secrets]                               # Set via: fly secrets set KEY=VALUE
# UPSTASH_REDIS_URL
# UPSTASH_REDIS_TOKEN
# UPSTASH_VECTOR_URL
# UPSTASH_VECTOR_TOKEN
