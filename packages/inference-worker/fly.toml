# fly.toml app configuration file generated for behavioral-inference on 2026-03-07T00:44:38+04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'behavioral-inference'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  CONSUMER_GROUP = 'inference_group'
  CONSUMER_NAME = 'fly_worker_1'
  DLQ_KEY = 'metricade_dlq'
  ENVIRONMENT = 'production'
  HEARTBEAT_INTERVAL_S = '30'
  HEARTBEAT_KEY = 'metricade_heartbeat'
  MODEL_PATH = '/models/v1_simclr_trained.pt'
  SPOT_CHECK_RATE = '0.01'
  STREAM_NAME = 'metricade_stream'
  VECTOR_DIMS = '192'

[http_service]
  internal_port = 8080
  force_https = true

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
