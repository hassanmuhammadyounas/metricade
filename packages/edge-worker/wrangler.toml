name               = "metricade-worker"
main               = "src/index.ts"
compatibility_date = "2025-09-01"
workers_dev        = true

[vars]
ENVIRONMENT         = "production"
STREAM_NAME         = "metricade_stream"
DLQ_KEY             = "metricade_dlq"
HEARTBEAT_KEY       = "metricade_heartbeat"
HEARTBEAT_TIMEOUT_S = "60"
TRACE_HEADER        = "x-trace-id"

[[triggers]]
crons = ["*/1 * * * *"]                 # Every 1 min — heartbeat check + DLQ drain
