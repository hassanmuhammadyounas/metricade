name               = "metricade-worker"
main               = "src/index.ts"
compatibility_date = "2025-09-01"
workers_dev        = true

routes = [
  { pattern = "worker.metricade.com", custom_domain = true }
]

[vars]
ENVIRONMENT         = "production"
STREAM_NAME         = "metricade_stream"
DLQ_KEY             = "metricade_dlq"
TRACE_HEADER        = "x-trace-id"
