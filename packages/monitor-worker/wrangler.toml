name               = "metricade-monitor"
main               = "src/index.ts"
compatibility_date = "2025-09-01"
workers_dev        = true

[vars]
UPSTASH_REDIS_URL         = "https://singular-fawn-58838.upstash.io"
UPSTASH_VECTOR_URL        = "https://bright-tiger-54944-us1-vector.upstash.io"
PIXEL_CDN_URL             = "https://pixel.metricade.com/pixel.min.js"
WORKER_HEALTH_URL         = "https://worker.metricade.com/health"
INFERENCE_HEALTH_URL      = "https://behavioral-inference.fly.dev/health"
